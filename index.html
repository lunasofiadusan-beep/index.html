<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Pro - Sistema de Seguimiento</title>
    <style>
        :root {
            --primary: #1e40af;
            --success: #15803d;
            --warning: #b45309;
            --danger: #b91c1c;
            --neutral: #64748b;
            --bg: #f1f5f9;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        nav { background: #0f172a; color: white; padding: 1rem 2rem; display: flex; align-items: center; gap: 15px; justify-content: space-between; }
        .nav-links { display: flex; gap: 10px; }
        .nav-link { color: #94a3b8; text-decoration: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        .nav-link.active { background: var(--primary); color: white; }
        
        .btn-csv { background: #059669; color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; border: none; }

        .search-box input { padding: 8px 12px; border-radius: 6px; border: none; width: 250px; font-size: 0.9rem; }

        .content { padding: 2rem; flex: 1; overflow-y: auto; max-width: 1300px; margin: 0 auto; width: 100%; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 2rem; }

        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { background: #f8fafc; padding: 12px; text-align: left; font-size: 0.75rem; color: #475569; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; vertical-align: top; }

        .status { padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; display: inline-block; text-transform: uppercase; }
        .status-interesado { background: #dcfce7; color: #166534; }
        .status-seguimiento { background: #fef3c7; color: #92400e; }
        .status-sin-respuesta { background: #f1f5f9; color: #475569; }
        .status-descartado { background: #fee2e2; color: #991b1b; }

        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; margin-top: 5px; box-sizing: border-box; }
        
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: 600; transition: 0.2s; padding: 10px 15px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-action { background: #e2e8f0; color: #1e293b; font-size: 0.8rem; }
        .btn-delete { background: #fee2e2; color: #b91c1c; font-size: 0.75rem; padding: 5px 10px; }

        .historial-box { max-height: 150px; overflow-y: auto; background: #f8fafc; padding: 8px; border-radius: 6px; font-size: 0.8rem; border: 1px solid #e2e8f0; }
        .historial-item { border-bottom: 1px solid #e2e8f0; padding: 8px 0; }

        /* --- CALENDARIO DINÁMICO --- */
        .calendar-container { width: 350px; flex-shrink: 0; border: 1px solid #e2e8f0; border-radius: 8px; background: white; overflow: hidden; height: fit-content; }
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; background: #1e293b; color: white; padding: 10px; }
        .calendar-nav button { background: none; color: white; padding: 5px 10px; font-size: 1.2rem; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .calendar-day-head { background: #f1f5f9; padding: 8px 0; text-align: center; font-size: 0.7rem; font-weight: bold; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        .calendar-day { height: 45px; border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; position: relative; padding: 5px; font-size: 0.8rem; text-align: center; }
        .calendar-day.empty { background: #f8fafc; }
        .dots-container { display: flex; gap: 3px; justify-content: center; margin-top: 2px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot-naranja { background-color: var(--warning); }
        .dot-verde { background-color: var(--success); }
        .today-circle { background: var(--primary); color: white; border-radius: 50%; width: 20px; height: 20px; display: inline-block; line-height: 20px; }
    </style>
</head>
<body>

<nav>
    <div style="display: flex; align-items: center; gap: 20px;">
        <h2 style="margin:0; font-size: 1.2rem; color: #60a5fa;">CRM SALESPRO</h2>
        <div class="nav-links">
            <div class="nav-link active" onclick="showPage('p-crear', this)">Nuevo Registro</div>
            <div class="nav-link" onclick="showPage('p-llamadas', this)">Panel de Control</div>
            <div class="nav-link" onclick="showPage('p-seguimiento', this)">Agenda y Calendario</div>
        </div>
        <button class="btn-csv" onclick="exportarCSV()">📥 CSV</button>
    </div>
    <div class="search-box">
        <input type="text" id="globalSearch" placeholder="Buscar por ID o Nombre..." onkeyup="searchGlobal()">
    </div>
</nav>

<div class="content">
    
    <div id="p-crear" class="page active">
        <div class="card">
            <h3>Registro de Nuevo Cliente</h3>
            <form id="formCliente">
                <div class="grid-form">
                    <div><label>Nombre Completo</label><input type="text" id="nombre" required></div>
                    <div><label>Teléfono</label><input type="tel" id="telefono" required></div>
                    <div><label>Correo</label><input type="email" id="correo"></div>
                    <div><label>Localidad</label><input type="text" id="localidad"></div>
                    <div><label>Dirección</label><input type="text" id="direccion"></div>
                    <div><label>CP</label><input type="text" id="cp"></div>
                </div>
                <button type="submit" class="btn-primary" style="margin-top:20px">Guardar Cliente</button>
            </form>
        </div>
    </div>

    <div id="p-llamadas" class="page">
        <div class="card">
            <h3>Control Operativo</h3>
            <table id="mainTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Contacto</th>
                        <th>Estado</th>
                        <th>Acción</th>
                        <th>Historial</th>
                    </tr>
                </thead>
                <tbody id="listaLlamadas"></tbody>
            </table>
        </div>
    </div>

    <div id="p-seguimiento" class="page">
        <div style="display: flex; gap: 30px; flex-wrap: wrap;">
            
            <div class="calendar-container">
                <div class="calendar-nav">
                    <button onclick="changeMonth(-1)">❮</button>
                    <span id="calendarTitle">MES AÑO</span>
                    <button onclick="changeMonth(1)">❯</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>

            <div style="flex: 1; min-width: 350px;">
                <div class="card">
                    <h4>Citas Programadas (Verde)</h4>
                    <div id="agendaContenedor"></div>
                </div>
                <div class="card">
                    <h4>Próximas Llamadas (Naranja)</h4>
                    <div id="seguimientoContenedor"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let clientes = JSON.parse(localStorage.getItem('crm_v3')) || [];
    let queryBusqueda = "";
    let currentViewDate = new Date(); // Fecha para controlar el mes que vemos en el calendario

    function save() { localStorage.setItem('crm_v3', JSON.stringify(clientes)); }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        renderAll();
    }

    function searchGlobal() {
        queryBusqueda = document.getElementById('globalSearch').value.toLowerCase();
        renderAll();
    }

    // REGISTRO
    document.getElementById('formCliente').addEventListener('submit', (e) => {
        e.preventDefault();
        const nuevo = {
            id: Math.floor(1000 + Math.random() * 9000), 
            nombre: document.getElementById('nombre').value,
            telefono: document.getElementById('telefono').value,
            correo: document.getElementById('correo').value || 'Sin correo',
            localidad: document.getElementById('localidad').value,
            direccion: document.getElementById('direccion').value,
            cp: document.getElementById('cp').value,
            llamadas: [],
            cita: null,
            rellamada: null
        };
        clientes.push(nuevo);
        save();
        e.target.reset();
        showPage('p-llamadas', document.querySelectorAll('.nav-link')[1]);
    });

    // GESTIÓN CON CALENDARIO DE FECHA
    function gestionarAccion(clienteId) {
        const idx = clientes.findIndex(c => c.id === clienteId);
        const comentario = prompt("Escriba el resumen de la conversación:");
        if (comentario === null) return;

        const seleccion = prompt("Resultado:\n1. Sin respuesta (Blanco)\n2. Programar seguimiento (Naranja)\n3. Concertar Visita (Verde)\n4. Descartar (Rojo)");
        
        if (seleccion === "2") {
            const fecha = prompt("¿Qué día debemos volver a llamar? (Formato: AAAA-MM-DD):", new Date().toISOString().split('T')[0]);
            if (fecha) {
                clientes[idx].rellamada = fecha;
                clientes[idx].llamadas.push({ fecha: new Date().toLocaleString(), estado: "seguimiento", nota: comentario });
            }
        } else if (seleccion === "3") {
            const fecha = prompt("Fecha de la cita (AAAA-MM-DD):", new Date().toISOString().split('T')[0]);
            const hora = prompt("¿A qué hora?");
            if (fecha) {
                clientes[idx].cita = { fecha, hora };
                clientes[idx].llamadas.push({ fecha: new Date().toLocaleString(), estado: "interesado", nota: comentario });
            }
        } else if (seleccion === "4") {
            clientes[idx].llamadas.push({ fecha: new Date().toLocaleString(), estado: "descartado", nota: comentario });
        } else {
            clientes[idx].llamadas.push({ fecha: new Date().toLocaleString(), estado: "sin-respuesta", nota: comentario });
        }
        save();
        renderAll();
    }

    // CONTROL DEL CALENDARIO
    function changeMonth(offset) {
        currentViewDate.setMonth(currentViewDate.getMonth() + offset);
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const title = document.getElementById('calendarTitle');
        grid.innerHTML = "";

        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        
        title.innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(currentViewDate).toUpperCase();

        const diasSemana = ['Lu', 'Ma', 'Mi', 'Ju', 'Vi', 'Sa', 'Do'];
        diasSemana.forEach(d => grid.innerHTML += `<div class="calendar-day-head">${d}</div>`);

        const firstDay = new Date(year, month, 1).getDay();
        const startOffset = firstDay === 0 ? 6 : firstDay - 1;
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < startOffset; i++) grid.innerHTML += `<div class="calendar-day empty"></div>`;

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            
            let dots = "";
            const hasNaranja = clientes.some(c => c.rellamada === dateStr);
            const hasVerde = clientes.some(c => c.cita && c.cita.fecha === dateStr);
            
            if (hasNaranja) dots += `<div class="dot dot-naranja"></div>`;
            if (hasVerde) dots += `<div class="dot dot-verde"></div>`;

            const isToday = new Date().toISOString().split('T')[0] === dateStr;
            const dayContent = isToday ? `<span class="today-circle">${d}</span>` : d;

            grid.innerHTML += `
                <div class="calendar-day">
                    ${dayContent}
                    <div class="dots-container">${dots}</div>
                </div>
            `;
        }
    }

    function renderAll() {
        const filtro = clientes.filter(c => c.nombre.toLowerCase().includes(queryBusqueda) || c.id.toString().includes(queryBusqueda));
        
        // Tabla principal
        const tbody = document.getElementById('listaLlamadas');
        tbody.innerHTML = "";
        filtro.forEach(c => {
            const ultima = c.llamadas[c.llamadas.length - 1] || { estado: 'sin-respuesta', nota: 'Sin actividad' };
            const historial = c.llamadas.slice().reverse().map(l => `
                <div class="historial-item"><b>${l.fecha}</b> - <span class="status status-${l.estado}">${l.estado}</span><br>${l.nota}</div>
            `).join("");

            tbody.innerHTML += `<tr>
                <td>#${c.id}</td>
                <td><b>${c.nombre}</b><br><small>${c.localidad}</small></td>
                <td>${c.telefono}</td>
                <td><span class="status status-${ultima.estado}">${ultima.estado}</span></td>
                <td><button class="btn-action" onclick="gestionarAccion(${c.id})">Gestionar</button></td>
                <td><div class="historial-box">${historial}</div></td>
            </tr>`;
        });

        // Listado de tareas
        document.getElementById('agendaContenedor').innerHTML = clientes.filter(c => c.cita).sort((a,b) => a.cita.fecha.localeCompare(b.cita.fecha)).map(c => `
            <div style="margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px">
                <b>${c.cita.fecha} (${c.cita.hora})</b>: ${c.nombre} 
                <button class="btn-delete" onclick="eliminarCita(${c.id})">OK</button>
            </div>`).join("") || "No hay citas";

        document.getElementById('seguimientoContenedor').innerHTML = clientes.filter(c => c.rellamada).sort((a,b) => a.rellamada.localeCompare(b.rellamada)).map(c => `
            <div style="margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px">
                <b>${c.rellamada}</b>: Re-llamar a ${c.nombre} 
                <button class="btn-delete" onclick="eliminarSeguimiento(${c.id})">OK</button>
            </div>`).join("") || "No hay llamadas pendientes";

        renderCalendar();
    }

    function eliminarCita(id) { const i = clientes.findIndex(c => c.id === id); clientes[i].cita = null; save(); renderAll(); }
    function eliminarSeguimiento(id) { const i = clientes.findIndex(c => c.id === id); clientes[i].rellamada = null; save(); renderAll(); }

    function exportarCSV() {
        let csv = "ID;Nombre;Telefono;Estado;Notas\n";
        clientes.forEach(c => {
            const ultima = c.llamadas[c.llamadas.length - 1] || { estado: 'N/A' };
            csv += `${c.id};${c.nombre};${c.telefono};${ultima.estado};${c.llamadas.map(l => l.nota).join(" | ")}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "CRM_Export.csv"; a.click();
    }

    renderAll();
</script>

</body>
</html>
